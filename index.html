<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNSIgZmlsbD0iIzhiM2ExYSIvPjx0ZXh0IHg9IjE2IiB5PSIyNSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1zaXplPSIyMiIgZmlsbD0iI2Y1ZjBlOCIgZm9udC1mYW1pbHk9InNlcmlmIj7wnYSePC90ZXh0Pjwvc3ZnPg==">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixed Up Rhythms</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.3/abcjs-basic-min.js"></script>
<style>
:root {
  --cream: #f5f0e8; --cream-dark: #ede7d9; --paper: #fdfaf5;
  --ink: #1a1612; --mid: #5a4e42; --light: #9a8e82; --rule: #c8b89a;
  --accent: #8b3a1a; --gold: #9a7010;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ink); color: var(--cream); font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; }

/* Rotate overlay */
.rotate-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: var(--ink); flex-direction: column; align-items: center;
  justify-content: center; gap: 18px; text-align: center; padding: 32px;
}
.rotate-icon { font-size: 3rem; animation: tilt 2s ease-in-out infinite; }
@keyframes tilt { 0%,100%{transform:rotate(0deg)} 40%,60%{transform:rotate(90deg)} }

/* Top bar */
.topbar { background: var(--ink); border-bottom: 3px solid var(--accent); padding: 0 28px; height: 62px; display: flex; align-items: center; justify-content: space-between; }
.app-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.14em; color: var(--cream); }
.settings-btn { background: none; border: 1px solid #444; color: #888; padding: 4px 12px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 0.75rem; }

/* Controls bar */
.controls { background: #111009; border-bottom: 2px solid #2a231d; padding: 16px 28px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
.ctl-block { display: flex; flex-direction: column; gap: 4px; }
.ctl-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.68rem; letter-spacing: 0.2em; color: var(--accent); }
.group-btns { display: flex; gap: 5px; }
.group-btn { width: 42px; height: 42px; border: 2px solid #2a231d; background: transparent; color: #666; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; cursor: pointer; }
.group-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.app-sel { background: #1a1410; border: 1px solid #333; color: var(--cream); padding: 7px 10px; font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; min-width: 150px; }

/* Keyboard & Chips */
.piano-wrap { width: 100%; height: 130px; margin-top: 10px; }
#piano-svg { width: 100%; height: 100%; cursor: pointer; }
.chips-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; min-height: 28px; }
.chip { background: var(--accent); color: white; padding: 4px 8px; font-family: 'Inconsolata', monospace; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
.chip button { background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 0 4px; }

/* Buttons */
.play-btn, .gen-btn { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.12em; cursor: pointer; border: none; width: 100%; padding: 12px; margin-top: 8px; }
.play-btn { background: #2a231d; color: var(--cream); border: 1px solid #444; }
.gen-btn { background: var(--accent); color: white; }
.gen-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Export Bar */
.export-bar { background: #0d0b09; padding: 12px 28px; display: none; gap: 12px; border-bottom: 2px solid #2a231d; }
.export-bar.visible { display: flex; }
.export-pdf-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; font-family: 'Bebas Neue', sans-serif; cursor: pointer; }

/* Output */
.output-area { background: var(--cream-dark); padding: 40px; min-height: 400px; }
.sheet { background: var(--paper); max-width: 860px; margin: 0 auto; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); color: var(--ink); }
.sheet-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; border-bottom: 2px solid var(--ink); margin-bottom: 20px; padding-bottom: 10px; }
.ex-row { margin-bottom: 10px; width: 100%; }

/* PRINT OVERLAY STYLES */
.print-overlay { display:none; position:fixed; inset:0; z-index:1000; background:white; overflow-y:auto; color: black; }
.print-overlay.open { display:block; }
.print-toolbar { position:sticky; top:0; background:#1a1612; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid #8b3a1a; z-index:1010; }
.print-toolbar-title { color: white; font-family: 'Bebas Neue', sans-serif; }
.print-action-btn { background:#8b3a1a; color:white; border:none; padding:8px 16px; font-family:'Bebas Neue', sans-serif; cursor:pointer; }
.print-close-btn { background:none; border:1px solid #ccc; color:white; padding:8px 16px; font-family:'Bebas Neue', sans-serif; cursor:pointer; }

.print-content { padding: 40px; max-width: 800px; margin: 0 auto; background: white; }
.print-content h1 { font-family: 'Bebas Neue', sans-serif; font-size: 22pt; border-bottom: 2px solid black; margin-bottom: 20px; }
.print-row { margin-bottom: 30px; page-break-inside: avoid; }
.print-row svg { width: 100% !important; height: auto !important; display: block; }

/* Global Print Mode Overrides */
@media print {
  body > *:not(.print-overlay) { display: none !important; }
  .print-overlay { display: block !important; position: relative !important; }
  .print-toolbar { display: none !important; }
  .print-content { padding: 0 !important; width: 100% !important; }
  /* Force Black Ink */
  svg path, svg rect, svg text, svg circle { fill: black !important; stroke: black !important; }
}

/* Modals */
.settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; justify-content: flex-end; }
.settings-overlay.open { display: flex; }
.settings-panel { background: var(--paper); width: 350px; height: 100%; padding: 30px; color: var(--ink); overflow-y: auto; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;flex-direction:column;">
    <div class="app-title">Mixed Up Rhythms</div>
    <div style="font-family:'Inconsolata',monospace;font-size:0.65rem;text-transform:uppercase;color:#aaa">Rhythm Pattern Generator</div>
  </div>
  <button class="settings-btn" onclick="openHelp()">Instructions</button>
</div>

<div class="controls">
  <div class="ctl-block">
    <div class="ctl-label">Group Size</div>
    <div class="group-btns">
      <button class="group-btn" data-n="3">3</button>
      <button class="group-btn" data-n="4">4</button>
      <button class="group-btn" data-n="5">5</button>
      <button class="group-btn" data-n="6">6</button>
      <button class="group-btn" data-n="7">7</button>
      <button class="group-btn" data-n="8">8</button>
    </div>
  </div>
  <div class="ctl-block">
    <div class="ctl-label">Clef</div>
    <select class="app-sel" id="clef-sel">
      <option value="treble">Treble</option>
      <option value="bass">Bass</option>
      <option value="alto">Alto</option>
      <option value="tenor">Tenor</option>
    </select>
  </div>
  <div class="ctl-block">
    <div class="ctl-label">Key</div>
    <select class="app-sel" id="key-sel">
      <option value="C">C major</option>
      <option value="G">G major</option>
      <option value="D">D major</option>
      <option value="A">A major</option>
      <option value="E">E major</option>
      <option value="F">F major</option>
      <option value="Bb">Bb major</option>
      <option value="Eb">Eb major</option>
    </select>
  </div>
  
  <div style="flex-basis: 100%;">
    <div class="piano-wrap">
      <svg id="piano-svg" viewBox="0 0 1008 130" preserveAspectRatio="none"></svg>
    </div>
    <div class="chips-row" id="chips"></div>
    <button class="play-btn" id="play-btn" onclick="playPassage()">▶ Play Passage</button>
    <div style="margin-top:10px;">
        <label class="ctl-label">Document Name</label>
        <input id="doc-name" type="text" placeholder="e.g. Brahms Mvt 1" style="width:100%; background:#1a1410; border:1px solid #333; color:white; padding:8px;">
    </div>
    <button class="gen-btn" id="gen-btn" disabled onclick="generateExercises()">Generate Exercises</button>
  </div>
</div>

<div class="export-bar" id="export-bar">
  <button class="export-pdf-btn" onclick="doExport()">🖨 Export / Print PDF</button>
  <button class="play-btn" style="width:auto; margin:0;" onclick="location.reload()">↺ Start Over</button>
</div>

<div class="output-area">
  <div id="empty-state" style="text-align:center; opacity:0.3; padding-top:100px;">
    <h1 style="font-size:5rem;">𝄞</h1>
    <p>Select group size and enter notes to begin</p>
  </div>
  <div id="sheet-wrap" style="display:none;">
    <div class="sheet">
      <div class="sheet-title" id="sheet-title"></div>
      <div id="exercises"></div>
    </div>
  </div>
</div>

<div class="print-overlay" id="print-overlay">
  <div class="print-toolbar">
    <div class="print-toolbar-title" id="print-overlay-title"></div>
    <div>
      <button class="print-action-btn" onclick="window.print()">Print / Save PDF</button>
      <button class="print-close-btn" onclick="closePrintOverlay()">✕ Close</button>
    </div>
  </div>
  <div class="print-content" id="print-content"></div>
</div>

<div class="settings-overlay" id="help-overlay" onclick="closeHelp()">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h2 style="font-family:'Bebas Neue'; border-bottom:1px solid #ccc; padding-bottom:10px; margin-bottom:10px;">Instructions</h2>
    <p>1. Click a <strong>Group Size</strong> (3-8).<br>2. Play notes on the <strong>Piano</strong>.<br>3. Name your document.<br>4. Click <strong>Generate</strong>.<br>5. Use <strong>Export PDF</strong> to save your practice sheet.</p>
    <button class="gen-btn" onclick="closeHelp()">Got it</button>
  </div>
</div>

<script>
// --- DATABASE ---
var DB = [
    {id:1, section:"Three-Note Rhythm Patterns", timeSig:"2/8", notes:["8","16","16"]},
    {id:2, section:"Three-Note Rhythm Patterns", timeSig:"2/8", notes:["16","16","8"]},
    {id:3, section:"Three-Note Rhythm Patterns", timeSig:"3/8", notes:["8","8","8"]},
    {id:4, section:"Four-Note Rhythm Patterns", timeSig:"2/4", notes:["16","16","16","16"]},
    {id:5, section:"Four-Note Rhythm Patterns", timeSig:"2/4", notes:["8","16","16","8"]}
];

// --- STATE ---
var activeGroup = null;
var selNotes = [];
var AC = null;

// --- INITIALIZATION ---
window.onload = function() {
    buildPiano();
    setupEventListeners();
};

function setupEventListeners() {
    document.querySelectorAll('.group-btn').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            activeGroup = parseInt(this.dataset.n);
            checkReady();
        };
    });
}

function checkReady() {
    document.getElementById('gen-btn').disabled = !(activeGroup && selNotes.length > 0);
}

// --- PIANO LOGIC ---
function buildPiano() {
    const svg = document.getElementById('piano-svg');
    const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    let x = 0;
    const wWidth = 24;

    for (let oct = 3; oct < 6; oct++) {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            if (!isBlack) {
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", x);
                rect.setAttribute("y", 0);
                rect.setAttribute("width", wWidth);
                rect.setAttribute("height", 130);
                rect.setAttribute("fill", "white");
                rect.setAttribute("stroke", "#ccc");
                rect.onclick = () => addNote(note + oct);
                svg.appendChild(rect);
                x += wWidth;
            }
        });
    }
}

function addNote(note) {
    selNotes.push(note);
    updateChips();
    playNote(note);
    checkReady();
}

function updateChips() {
    const container = document.getElementById('chips');
    container.innerHTML = selNotes.map((n, i) => `
        <div class="chip">${n} <button onclick="selNotes.splice(${i},1); updateChips(); checkReady();">×</button></div>
    `).join('');
}

function playNote(note) {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = {"C3":130.81, "C4":261.63, "C5":523.25, "G4":392.00}; // Simplified mapping
    const f = freqs[note] || 440;
    const osc = AC.createOscillator();
    const gain = AC.createGain();
    osc.connect(gain); gain.connect(AC.destination);
    osc.frequency.value = f;
    gain.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 0.5);
    osc.start(); osc.stop(AC.currentTime + 0.5);
}

function playPassage() {
    selNotes.forEach((n, i) => setTimeout(() => playNote(n), i * 500));
}

// --- GENERATION & ABCJS ---
function generateExercises() {
    const sec = activeGroup + "-Note Rhythm Patterns";
    const pats = DB.filter(p => p.section.startsWith(activeGroup.toString()));
    
    document.getElementById('sheet-title').textContent = document.getElementById('doc-name').value || "Exercises";
    const container = document.getElementById('exercises');
    container.innerHTML = '';

    pats.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'ex-row';
        row.id = 'ex-' + i;
        container.appendChild(row);

        // Simple ABC String Generation
        const abc = `X:1\nM:${p.timeSig}\nL:1/16\nK:${document.getElementById('key-sel').value}\n| ${selNotes.map(n => n[0]).join(' ')} |`;
        
        ABCJS.renderAbc('ex-' + i, abc, {
            responsive: 'resize',
            staffwidth: 740,
            scale: 1.0
        });
    });

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('sheet-wrap').style.display = 'block';
    document.getElementById('export-bar').classList.add('visible');
}

// --- EXPORT & PRINT ---
function doExport() {
    const title = document.getElementById('sheet-title').textContent;
    document.getElementById('print-overlay-title').textContent = title;
    const content = document.getElementById('print-content');
    content.innerHTML = `<h1>${title}</h1>`;

    document.querySelectorAll('.ex-row svg').forEach(svg => {
        const clone = svg.cloneNode(true);
        clone.setAttribute('width', '100%');
        const div = document.createElement('div');
        div.className = 'print-row';
        div.appendChild(clone);
        content.appendChild(div);
    });

    document.getElementById('print-overlay').classList.add('open');
}

function closePrintOverlay() {
    document.getElementById('print-overlay').classList.remove('open');
}

function openHelp() { document.getElementById('help-overlay').classList.add('open'); }
function closeHelp() { document.getElementById('help-overlay').classList.remove('open'); }
</script>
</body>
</html>
